name: Zero-Touch CI Test

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  infrastructure-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Infrastructure
        run: docker-compose build

      - name: Test Container Initialization
        run: |
          docker-compose up -d
          sleep 15
          docker-compose ps