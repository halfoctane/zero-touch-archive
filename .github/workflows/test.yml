name: Zero-Touch CI Test

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  infrastructure-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Infrastructure
        run: docker compose build

      - name: Test Container Initialization
        run: |
          docker compose up -d
          sleep 15
          docker compose ps

      - name: Verify Backup Was Created
        run: |
          sleep 40
          ls -la my-local-backups/
          test $(ls my-local-backups/*.sql.gz 2>/dev/null | wc -l) -gt 0 && echo "BACKUP EXISTS" || echo "BACKUP MISSING"
